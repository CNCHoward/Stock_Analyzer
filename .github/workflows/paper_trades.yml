name: Paper Trades Update

on:
  schedule:
    # 1 hour before market open: 8:30 AM ET
    # EDT (Mar-Nov): UTC-4  -> 12:30 UTC
    # EST (Nov-Mar): UTC-5  -> 13:30 UTC
    # Running both so it fires correctly year-round (one will be ~1hr off-season)
    - cron: '30 12 * * 1-5'   # 8:30 AM EDT (summer)
    - cron: '30 13 * * 1-5'   # 8:30 AM EST (winter)

    # 1 hour before market close: 3:00 PM ET
    # EDT (Mar-Nov): UTC-4  -> 19:00 UTC
    # EST (Nov-Mar): UTC-5  -> 20:00 UTC
    - cron: '0 19 * * 1-5'    # 3:00 PM EDT (summer)
    - cron: '0 20 * * 1-5'    # 3:00 PM EST (winter)

  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy rich

      - name: Run paper trades update
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python paper_trades.py --email

      - name: Commit updated snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_trades.json
          git diff --staged --quiet || git commit -m "Auto: paper trades snapshot $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
